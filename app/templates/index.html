<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Link Shortener</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #6366f1 0%, #f472b6 100%);
      min-height: 100vh;
    }
    .glass {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">
  <div class="glass max-w-md w-full p-8 mx-2">
    <h2 class="text-3xl font-extrabold text-center text-white mb-8 drop-shadow">🔗 Link 2 TV</h2>
    <!-- Submit Link Form -->
    <form id="generateForm" class="mb-6">
      <label for="linkInput" class="block text-white font-semibold mb-2">Enter Link to Generate Code</label>
      <input type="url" id="linkInput" class="w-full px-4 py-2 rounded-lg bg-white/80 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400 text-gray-800 mb-3 transition" placeholder="https://example.com" required>
      <button type="submit" class="w-full py-2 rounded-lg bg-indigo-500 hover:bg-indigo-600 text-white font-bold shadow transition">Generate Code</button>
    </form>
    <div id="generateResult" class="text-center text-lg font-medium text-green-200 mb-6"></div>
    <div class="border-t border-white/30 my-6"></div>
    <!-- Retrieve Link Form -->
    <form id="retrieveForm" class="mb-6">
      <label for="codeInput" class="block text-white font-semibold mb-2">Enter Code to Retrieve Link</label>
      <input type="text" id="codeInput" class="w-full px-4 py-2 rounded-lg bg-white/80 focus:bg-white focus:outline-none focus:ring-2 focus:ring-pink-400 text-gray-800 mb-3 transition" placeholder="e.g. XyZ123" required>
      <button type="submit" class="w-full py-2 rounded-lg bg-pink-500 hover:bg-pink-600 text-white font-bold shadow transition">Retrieve Link</button>
    </form>
    <!-- ...inside your retrieveResult div... -->
    <div id="retrieveResult" class="text-center text-lg font-medium text-pink-200"></div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    // Generate code from link
    $('#generateForm').submit(function(e) {
      e.preventDefault();
      $('#generateResult').text('Generating...');

      // validate that the input is a valid URL
      const url = $('#linkInput').val();

      try {
        new URL(url);
      } catch (_) {
        $('#generateResult').text('Invalid URL format. Please enter a valid URL.');
        return;
      }
       
      $.ajax({
        url: '/api/generate-code',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ url: url }),
        success: function(data) {
          $('#generateResult').html(
            'Your code: <span class="underline text-green-200 hover:text-white transition cursor-pointer">' + data.code + '</span>'
          );
        },
        error: function(data) {
          $('#generateResult').text('Error generating code: ' + data.responseJSON.message);
        }
      });

     });
    // Retrieve link from code
    $('#retrieveForm').submit(function(e) {
      e.preventDefault();

      const code = $('#codeInput').val().toUpperCase();
      
      // check if code is empty
      if (code.trim() === '') {
        $('#retrieveResult').text('Please enter a code to retrieve the link.');
        return;
      }

      // check if code is url encoded
      if (encodeURIComponent(code) !== code) {
        $('#retrieveResult').text('Invalid code format. Code should not contain URL-encoded characters.');
        return;
      }
      

      // const code = $('#codeInput').val();
      $('#retrieveResult').text('Retrieving...');
      $.get('/api/retrieve/' + code, function(data) {
         $('#retrieveResult').html(
                'Your link: <span id="retrievedLink" class="underline text-pink-100 hover:text-white transition cursor-pointer">' +
                '<a href="' + data.original_url + '" target="_blank">' + data.original_url + '</a></span>' +
                '<button id="copyBtn" class="ml-3 px-3 py-1 rounded-lg bg-pink-400 hover:bg-pink-600 text-white font-bold transition text-sm">Copy</button>' +
                '<span id="copyMsg" class="ml-2 text-green-200 font-semibold" style="display:none;">Copied!</span>'
              );
              $('#copyBtn').click(function() {
                const link = data.original_url;
                navigator.clipboard.writeText(link).then(function() {
                  $('#copyMsg').fadeIn(200).delay(1000).fadeOut(400);
                });
              });
      }).fail(function(data) {
        $('#retrieveResult').text('Error retrieving link: ' + data.responseJSON.message);
      });
    });
  </script>
</body>
</html>
